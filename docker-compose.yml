services:
  postgres:
    image: postgres:16-alpine
    container_name: nkc-postgres
    environment:
      POSTGRES_USER: nkc
      POSTGRES_PASSWORD: nkc_dev_password
      POSTGRES_DB: nkc
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./infra/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nkc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
